<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#030712">
<title>Train Track Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-1: #111827;
    --bg-2: #030712;
    --panel: rgba(255, 255, 255, 0.04);
    --panel-border: rgba(255, 255, 255, 0.08);
    --text: #e5e7eb;
    --text-dim: #94a3b8;
    --accent: #60a5fa;
    --accent-strong: #3b82f6;
    --accent-bg: rgba(96, 165, 250, 0.16);
    --warn: #fbbf24;
    --warn-bg: rgba(251, 191, 36, 0.16);
    --danger: #ef4444;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
    color: var(--text);
    background: var(--bg-2);
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  canvas { display: block; cursor: crosshair; touch-action: none; }
  #canvas3d-container { position: absolute; inset: 0; display: none; touch-action: none; }
  #canvas3d-container canvas { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
  #canvas3d-container.dragging canvas { cursor: grabbing; }
  button { -webkit-tap-highlight-color: transparent; }

  .panel {
    background: var(--panel);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .view-toggle {
    position: absolute; top: 18px; left: 18px;
    display: flex; gap: 2px; padding: 4px; z-index: 5;
  }
  .view-btn {
    padding: 7px 14px;
    background: transparent; border: none;
    color: var(--text-dim);
    border-radius: 8px; cursor: pointer;
    font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
    font-family: inherit;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .view-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .view-btn.active { background: var(--accent-bg); color: var(--accent); }
  .view-btn svg { width: 14px; height: 14px; stroke-width: 2; fill: none; stroke: currentColor; }

  .toolbar {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 2px; padding: 6px; z-index: 5;
  }
  .tool-btn {
    padding: 8px 14px; background: transparent; border: none; color: var(--text-dim);
    border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500;
    transition: background 0.15s, color 0.15s;
    display: flex; align-items: center; gap: 8px; font-family: inherit;
  }
  .tool-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .tool-btn.active { background: var(--accent-bg); color: var(--accent); }
  .tool-btn[data-tool="switch"].active { background: var(--warn-bg); color: var(--warn); }
  .tool-btn svg { width: 16px; height: 16px; stroke-width: 1.8; }
  .tool-btn .key {
    font-size: 10px; opacity: 0.5; padding: 1px 4px;
    border: 1px solid currentColor; border-radius: 3px; line-height: 1;
  }

  .controls {
    position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 14px; align-items: center; padding: 8px 14px; z-index: 5;
  }
  .play-btn {
    background: linear-gradient(135deg, #60a5fa, #3b82f6);
    border: none; color: white; width: 42px; height: 42px;
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 18px rgba(59, 130, 246, 0.45);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .play-btn:hover { transform: scale(1.06); box-shadow: 0 8px 22px rgba(59, 130, 246, 0.6); }
  .play-btn:active { transform: scale(0.96); }
  .play-btn svg { width: 18px; height: 18px; fill: white; }

  .speed-control { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 12px; }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 140px; height: 4px; background: rgba(255,255,255,0.1);
    border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; background: var(--accent);
    border-radius: 50%; cursor: pointer;
    box-shadow: 0 0 0 4px rgba(96,165,250,0.18);
    transition: box-shadow 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 0 6px rgba(96,165,250,0.28);
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px; background: var(--accent);
    border-radius: 50%; cursor: pointer; border: none;
    box-shadow: 0 0 0 4px rgba(96,165,250,0.18);
  }

  .icon-btn {
    background: transparent; border: none; color: var(--text-dim);
    padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: 12px;
    display: flex; align-items: center; gap: 6px; transition: all 0.15s;
    font-family: inherit; font-weight: 500;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .icon-btn svg { width: 13px; height: 13px; stroke-width: 2; }

  .hint {
    position: absolute; top: 18px; right: 18px;
    padding: 12px 14px; color: var(--text-dim); font-size: 12px;
    max-width: 280px; line-height: 1.55; z-index: 5;
  }
  .hint .title { color: var(--text); font-weight: 600; margin-bottom: 4px; font-size: 12px; }
  .hint kbd {
    background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 4px;
    font-family: ui-monospace, "SF Mono", monospace; font-size: 10.5px;
    color: var(--text); border: 1px solid rgba(255,255,255,0.08);
  }

  .divider { width: 1px; height: 22px; background: rgba(255,255,255,0.08); }

  .stats {
    position: absolute; bottom: 22px; left: 22px;
    padding: 8px 12px; color: var(--text-dim); font-size: 11px;
    font-family: ui-monospace, "SF Mono", monospace;
    letter-spacing: 0.02em; z-index: 5;
  }
  .stats span { color: var(--text); }

  .badge {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.08);
    font-size: 22px; font-weight: 200; letter-spacing: 0.4em;
    pointer-events: none; text-transform: uppercase;
    transition: opacity 0.3s;
  }

  .train-menu {
    position: absolute; padding: 14px; min-width: 210px; z-index: 20;
    pointer-events: auto;
    animation: menuPop 0.16s cubic-bezier(0.22, 1, 0.36, 1);
    transform-origin: left center;
  }
  @keyframes menuPop {
    from { opacity: 0; transform: scale(0.94) translateY(2px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .menu-title {
    color: var(--text); font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.16em; opacity: 0.55; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .menu-title .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: linear-gradient(135deg, #60a5fa, #3b82f6);
    box-shadow: 0 0 8px rgba(96,165,250,0.6);
  }
  .menu-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 5px 0;
    font-size: 13px; color: var(--text);
  }
  .menu-row .label { color: var(--text-dim); font-size: 12px; }
  .wagon-control {
    display: flex; align-items: center; gap: 4px;
    background: rgba(0,0,0,0.2); border-radius: 8px; padding: 3px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .round-btn {
    width: 26px; height: 26px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text); border-radius: 6px; cursor: pointer;
    font-size: 15px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s; font-family: inherit;
  }
  .round-btn:hover { background: rgba(96,165,250,0.2); border-color: rgba(96,165,250,0.3); color: var(--accent); }
  .round-btn:active { transform: scale(0.92); }
  .round-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .round-btn:disabled:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.08); color: var(--text); }
  .wagon-count {
    min-width: 24px; text-align: center;
    font-variant-numeric: tabular-nums; font-weight: 600;
    color: var(--text);
  }
  .menu-sep { height: 1px; background: rgba(255,255,255,0.06); margin: 10px 0 8px; }
  .delete-btn {
    width: 100%; padding: 8px 10px;
    background: rgba(239,68,68,0.10);
    border: 1px solid rgba(239,68,68,0.22);
    color: #fca5a5; border-radius: 8px; cursor: pointer;
    font-size: 12px; font-weight: 500; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all 0.12s;
  }
  .delete-btn:hover {
    background: rgba(239,68,68,0.22);
    border-color: rgba(239,68,68,0.4);
    color: #fecaca;
  }
  .delete-btn svg { width: 13px; height: 13px; stroke-width: 2; }

  body.view-3d .toolbar,
  body.view-3d .badge,
  body.view-3d .train-menu { display: none !important; }

  /* Hint can be collapsed via a chevron button on small screens */
  .hint-toggle {
    display: none;
    position: absolute; top: 18px; right: 18px;
    width: 38px; height: 38px;
    background: var(--panel);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255,255,255,0.06);
    align-items: center; justify-content: center;
    color: var(--text-dim); cursor: pointer;
    z-index: 6;
  }
  .hint-toggle svg { width: 18px; height: 18px; stroke-width: 2; fill: none; stroke: currentColor; }

  /* ===== Tablet & smaller ===== */
  @media (max-width: 900px) {
    .view-btn .btn-label,
    .tool-btn .btn-label,
    .icon-btn .btn-label,
    .tool-btn .key {
      display: none;
    }
    .view-btn, .tool-btn { padding: 8px 10px; gap: 0; }
    .icon-btn { padding: 7px 9px; }
    .speed-control > span { display: none; }
    input[type=range] { width: 100px; }
  }

  /* ===== Phone ===== */
  @media (max-width: 640px) {
    .view-toggle {
      top: max(8px, env(safe-area-inset-top));
      left: max(8px, env(safe-area-inset-left));
      padding: 3px;
    }
    .view-btn { padding: 8px 10px; font-size: 11px; }
    .view-btn svg { width: 16px; height: 16px; }

    /* Move the tool palette to just above the bottom controls so the top edge
       stays clear for view-toggle (left) + hint-toggle (right), avoiding overlap
       on narrow phones. */
    .toolbar {
      top: auto;
      bottom: calc(max(12px, env(safe-area-inset-bottom)) + 66px);
      left: 50%;
      transform: translateX(-50%);
      padding: 4px;
      gap: 1px;
    }
    .tool-btn { padding: 9px 9px; }
    .tool-btn svg { width: 18px; height: 18px; }

    .hint { display: none; }
    .hint-toggle {
      display: flex;
      top: max(8px, env(safe-area-inset-top));
      right: max(8px, env(safe-area-inset-right));
    }
    body.hint-open .hint {
      display: block;
      top: calc(max(8px, env(safe-area-inset-top)) + 48px);
      right: max(8px, env(safe-area-inset-right));
      max-width: calc(100vw - 24px);
      font-size: 12px;
      padding: 10px 12px;
      z-index: 6;
    }
    body.view-3d .hint-toggle,
    body.view-3d.hint-open .hint { /* still useful in 3d/fps */ }

    .controls {
      bottom: max(12px, env(safe-area-inset-bottom));
      gap: 8px;
      padding: 6px 10px;
      max-width: calc(100vw - 16px);
      flex-wrap: nowrap;
    }
    .play-btn { width: 38px; height: 38px; }
    .play-btn svg { width: 16px; height: 16px; }
    .speed-control { gap: 6px; }
    input[type=range] { width: 90px; }
    .icon-btn { padding: 8px; }
    .icon-btn svg { width: 15px; height: 15px; }
    .divider { height: 18px; }

    .stats {
      bottom: auto;
      top: calc(max(8px, env(safe-area-inset-top)) + 48px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      padding: 4px 8px;
      opacity: 0.7;
      white-space: nowrap;
    }

    .badge { font-size: 14px; letter-spacing: 0.25em; padding: 0 24px; text-align: center; }

    .train-menu { min-width: 200px; padding: 12px; }
    .round-btn { width: 30px; height: 30px; font-size: 16px; }
    .delete-btn { padding: 10px; }

    /* Larger hit target via inflated padding on small tap-friendly buttons */
    .view-btn, .tool-btn, .icon-btn, .play-btn, .round-btn, .delete-btn { min-height: 36px; }
  }

  /* ===== Very small phones (narrow) ===== */
  @media (max-width: 420px) {
    .controls { gap: 6px; padding: 5px 8px; }
    input[type=range] { width: 80px; }
    .stats { display: none; }
    .toolbar { padding: 3px; gap: 0; }
    .tool-btn { padding: 8px; }
    .view-btn { padding: 7px 8px; }
    #resetViewBtn { padding: 8px; }
  }

  /* Landscape phone: keep panels small and out of the way. The tall vertical
     space is gone, so put the toolbar at the top again. */
  @media (max-height: 480px) and (orientation: landscape) {
    .toolbar {
      top: 6px;
      bottom: auto;
      padding: 3px;
    }
    .view-toggle { top: 6px; left: 6px; padding: 3px; }
    .hint-toggle { top: 6px; right: 6px; width: 34px; height: 34px; }
    .controls { bottom: 6px; padding: 5px 8px; }
    .stats { top: auto; bottom: 50px; left: 6px; right: auto; transform: none; }
    .play-btn { width: 34px; height: 34px; }
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app">
  <canvas id="canvas"></canvas>
  <div id="canvas3d-container"></div>

  <div class="badge" id="emptyBadge">Tap to start drawing</div>

  <div class="panel view-toggle">
    <button class="view-btn active" data-view="2d" title="2D view">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 12h18M12 3v18"/></svg>
      <span class="btn-label">2D</span>
    </button>
    <button class="view-btn" data-view="3d" title="3D view">
      <svg viewBox="0 0 24 24"><path d="M12 2l9 5v10l-9 5-9-5V7l9-5z"/><path d="M3 7l9 5 9-5M12 12v10"/></svg>
      <span class="btn-label">3D</span>
    </button>
    <button class="view-btn" data-view="fps" title="Ride the train (cab view)">
      <svg viewBox="0 0 24 24"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
      <span class="btn-label">FPS</span>
    </button>
  </div>

  <div class="panel toolbar">
    <button class="tool-btn active" data-tool="track" title="Track tool (1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M3 16C7 6 17 6 21 16"/></svg>
      <span class="btn-label">Track</span> <span class="key">1</span>
    </button>
    <button class="tool-btn" data-tool="move" title="Move tool (2)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v16M4 12h16M9 7l3-3 3 3M9 17l3 3 3-3M7 9l-3 3 3 3M17 9l3 3-3 3"/></svg>
      <span class="btn-label">Move</span> <span class="key">2</span>
    </button>
    <button class="tool-btn" data-tool="train" title="Train tool (3)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="14" height="9" rx="2"/><circle cx="8" cy="18" r="1.6"/><circle cx="14" cy="18" r="1.6"/><path d="M18 9l3 3-3 3"/></svg>
      <span class="btn-label">Train</span> <span class="key">3</span>
    </button>
    <button class="tool-btn" data-tool="switch" title="Switch tool (4)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18h6c2 0 3-1 4-3l5-9h3"/><path d="M3 18h6c2 0 3 1 4 3h2"/><path d="M19 3l3 3-3 3"/></svg>
      <span class="btn-label">Switch</span> <span class="key">4</span>
    </button>
    <button class="tool-btn" data-tool="erase" title="Erase tool (5)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1.2 14.2A1.5 1.5 0 0 1 16.3 22H7.7a1.5 1.5 0 0 1-1.5-1.4L5 6"/></svg>
      <span class="btn-label">Erase</span> <span class="key">5</span>
    </button>
  </div>

  <div class="panel controls">
    <button class="play-btn" id="playBtn" title="Play / Pause (Space)">
      <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div class="speed-control">
      <span>Speed</span>
      <input type="range" id="speed" min="20" max="500" value="160">
    </div>
    <div class="divider"></div>
    <button class="icon-btn" id="resetViewBtn" title="Reset view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>
      <span class="btn-label">Reset view</span>
    </button>
    <button class="icon-btn" id="clearBtn" title="Clear all">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
      <span class="btn-label">Clear all</span>
    </button>
  </div>

  <button class="hint-toggle" id="hintToggle" title="Show tip" aria-label="Show tip">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v5h1"/></svg>
  </button>

  <div class="panel hint" id="hint">
    <div class="title">Track tool</div>
    <div class="body"></div>
  </div>

  <div class="stats">
    <span id="statNodes">0</span> points · <span id="statEdges">0</span> tracks · <span id="statTrains">0</span> trains
  </div>

  <div class="panel train-menu" id="trainMenu" style="display:none;">
    <div class="menu-title"><span class="dot"></span><span>Locomotive</span></div>
    <div class="menu-row">
      <span class="label">Wagons</span>
      <div class="wagon-control">
        <button class="round-btn" id="wagonDec" title="Remove wagon">−</button>
        <span class="wagon-count" id="wagonCount">0</span>
        <button class="round-btn" id="wagonInc" title="Add wagon">+</button>
      </div>
    </div>
    <div class="menu-row">
      <span class="label">Direction</span>
      <button class="round-btn" id="reverseBtn" title="Reverse direction" style="width:auto;padding:0 10px;font-size:12px;">⇋ Reverse</button>
    </div>
    <div class="menu-sep"></div>
    <button class="delete-btn" id="deleteTrain">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1.2 14.2A1.5 1.5 0 0 1 16.3 22H7.7a1.5 1.5 0 0 1-1.5-1.4L5 6"/></svg>
      Delete train
    </button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

"use strict";

// ---------- Setup ----------
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const DPR = window.devicePixelRatio || 1;
let W = 0, H = 0;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  if (view3d && view3d.renderer) view3d.handleResize();
}

// ---------- View ----------
const view = { x: 0, y: 0, scale: 1 };
const s2w = (sx, sy) => ({ x: (sx - view.x) / view.scale, y: (sy - view.y) / view.scale });

// ---------- Data ----------
let nextId = 1;
const nodes = new Map();
const edges = new Map();
const trains = [];

// Touch input is coarse — give snap/pick a bigger radius on touch devices so
// tap targets are finger-sized rather than mouse-cursor sized.
const IS_TOUCH = (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) || ('ontouchstart' in window);
const SNAP_PX = IS_TOUCH ? 28 : 18;
const WAGON_FIRST = 33;
const WAGON_GAP = 30;
const MAX_WAGONS = 12;

let tracksDirty = true;
function markTracksDirty() { tracksDirty = true; }

function getConnectedEdges(nodeId) {
  const arr = [];
  for (const e of edges.values()) if (e.from === nodeId || e.to === nodeId) arr.push(e);
  return arr;
}

function nodeTangentLine(nodeId) {
  const node = nodes.get(nodeId);
  const conn = getConnectedEdges(nodeId);
  if (!conn.length) return null;
  const e = conn[0];
  const cp = (e.from === nodeId) ? e.cp1 : e.cp2;
  const dx = cp.x - node.x, dy = cp.y - node.y;
  const len = Math.hypot(dx, dy);
  if (len < 0.001) return null;
  return { x: dx / len, y: dy / len };
}

function tangentToward(nodeId, tx, ty) {
  const node = nodes.get(nodeId);
  const line = nodeTangentLine(nodeId);
  const dx = tx - node.x, dy = ty - node.y;
  if (!line) {
    const len = Math.hypot(dx, dy);
    return len > 0.001 ? { x: dx / len, y: dy / len } : { x: 1, y: 0 };
  }
  const dot = dx * line.x + dy * line.y;
  return dot >= 0 ? line : { x: -line.x, y: -line.y };
}

function addNode(x, y) {
  const id = nextId++;
  nodes.set(id, { id, x, y, switchEdge: null });
  return id;
}

function computeSmoothTangent(nodeId) {
  // Catmull-Rom-style tangent: for chain nodes, points from previous neighbor toward next.
  const node = nodes.get(nodeId);
  const neighbors = [];
  for (const e of edges.values()) {
    if (e.from === nodeId) neighbors.push(nodes.get(e.to));
    else if (e.to === nodeId) neighbors.push(nodes.get(e.from));
  }
  if (neighbors.length === 0) return null;
  if (neighbors.length === 1) {
    const dx = neighbors[0].x - node.x, dy = neighbors[0].y - node.y;
    const len = Math.hypot(dx, dy);
    return len > 0.001 ? { x: dx / len, y: dy / len } : null;
  }
  if (neighbors.length === 2) {
    const dx = neighbors[1].x - neighbors[0].x, dy = neighbors[1].y - neighbors[0].y;
    const len = Math.hypot(dx, dy);
    return len > 0.001 ? { x: dx / len, y: dy / len } : null;
  }
  return null; // junction: caller uses getExistingTangentLine instead
}

function getExistingTangentLine(nodeId, excludeEdgeId) {
  // Direction of the "main line" tangent at a junction, derived from any other
  // edge already connected to this node. Used so a new branch leaves the junction
  // tangent to the existing line (like a real railway switch).
  const node = nodes.get(nodeId);
  for (const e of edges.values()) {
    if (e.id === excludeEdgeId) continue;
    if (e.from !== nodeId && e.to !== nodeId) continue;
    const cp = e.from === nodeId ? e.cp1 : e.cp2;
    const dx = cp.x - node.x, dy = cp.y - node.y;
    const len = Math.hypot(dx, dy);
    if (len > 0.001) return { x: dx / len, y: dy / len };
  }
  return null;
}

function setEdgeCP(edge, atFrom) {
  const nodeId = atFrom ? edge.from : edge.to;
  const node = nodes.get(nodeId);
  const otherNode = nodes.get(atFrom ? edge.to : edge.from);
  const dx = otherNode.x - node.x, dy = otherNode.y - node.y;
  const dist = Math.hypot(dx, dy);
  if (dist < 0.001) return;
  const off = Math.max(dist / 2.8, 30);
  let dir;
  const tan = computeSmoothTangent(nodeId);
  if (tan) {
    const dot = tan.x * dx + tan.y * dy;
    dir = dot >= 0 ? tan : { x: -tan.x, y: -tan.y };
  } else {
    // Junction: align this new edge tangent to the existing main line at the node
    const existing = getExistingTangentLine(nodeId, edge.id);
    if (existing) {
      const dot = existing.x * dx + existing.y * dy;
      dir = dot >= 0 ? existing : { x: -existing.x, y: -existing.y };
    } else {
      dir = { x: dx / dist, y: dy / dist };
    }
  }
  const cp = atFrom ? edge.cp1 : edge.cp2;
  cp.x = node.x + dir.x * off;
  cp.y = node.y + dir.y * off;
}

function smoothEdge(edge) {
  setEdgeCP(edge, true);
  setEdgeCP(edge, false);
  buildArc(edge);
}

function addEdge(fromId, toId) {
  if (fromId === toId) return null;
  for (const e of edges.values()) {
    if ((e.from === fromId && e.to === toId) || (e.from === toId && e.to === fromId)) return e.id;
  }
  const id = nextId++;
  const e = { id, from: fromId, to: toId, cp1: { x: 0, y: 0 }, cp2: { x: 0, y: 0 }, _arc: null };
  edges.set(id, e);
  smoothEdge(e);
  // Re-smooth chain neighbors whose tangent line just changed (degree-2 nodes).
  // Junctions (3+) are left untouched so user-laid main lines stay smooth.
  for (const nid of [fromId, toId]) {
    if (getConnectedEdges(nid).length === 2) {
      for (const other of getConnectedEdges(nid)) {
        if (other.id === id) continue;
        setEdgeCP(other, other.from === nid);
        buildArc(other);
      }
    }
  }
  markTracksDirty();
  return id;
}

function deleteNode(nodeId) {
  for (const e of [...edges.values()]) {
    if (e.from === nodeId || e.to === nodeId) deleteEdge(e.id);
  }
  nodes.delete(nodeId);
  markTracksDirty();
}
function deleteEdge(edgeId) {
  edges.delete(edgeId);
  for (let i = trains.length - 1; i >= 0; i--) {
    if (trains[i].edgeId === edgeId) {
      const t = trains[i];
      if (t === selectedTrain) selectedTrain = null;
      trains.splice(i, 1);
    }
  }
  for (const n of nodes.values()) if (n.switchEdge === edgeId) n.switchEdge = null;
  markTracksDirty();
}
function deleteTrain(train) {
  const idx = trains.indexOf(train);
  if (idx >= 0) trains.splice(idx, 1);
  if (train === selectedTrain) { selectedTrain = null; hideTrainMenu(); }
}

// ---------- Bezier ----------
function bezPoint(e, t) {
  const a = nodes.get(e.from), b = nodes.get(e.to);
  const u = 1 - t, u2 = u * u, t2 = t * t;
  return {
    x: u2 * u * a.x + 3 * u2 * t * e.cp1.x + 3 * u * t2 * e.cp2.x + t2 * t * b.x,
    y: u2 * u * a.y + 3 * u2 * t * e.cp1.y + 3 * u * t2 * e.cp2.y + t2 * t * b.y,
  };
}
function bezTangent(e, t) {
  const a = nodes.get(e.from), b = nodes.get(e.to);
  const u = 1 - t;
  let x = 3 * u * u * (e.cp1.x - a.x) + 6 * u * t * (e.cp2.x - e.cp1.x) + 3 * t * t * (b.x - e.cp2.x);
  let y = 3 * u * u * (e.cp1.y - a.y) + 6 * u * t * (e.cp2.y - e.cp1.y) + 3 * t * t * (b.y - e.cp2.y);
  const len = Math.hypot(x, y);
  if (len < 0.0001) return { x: 1, y: 0 };
  return { x: x / len, y: y / len };
}
function buildArc(e) {
  const N = 64;
  const samples = new Array(N + 1);
  let cum = 0;
  let prev = bezPoint(e, 0);
  samples[0] = { t: 0, s: 0, x: prev.x, y: prev.y };
  for (let i = 1; i <= N; i++) {
    const t = i / N;
    const p = bezPoint(e, t);
    cum += Math.hypot(p.x - prev.x, p.y - prev.y);
    samples[i] = { t, s: cum, x: p.x, y: p.y };
    prev = p;
  }
  e._arc = { samples, total: cum };
}
function tFromS(e, s) {
  if (!e._arc) buildArc(e);
  const a = e._arc.samples;
  if (s <= 0) return 0;
  if (s >= e._arc.total) return 1;
  let lo = 0, hi = a.length - 1;
  while (hi - lo > 1) {
    const m = (lo + hi) >> 1;
    if (a[m].s < s) lo = m; else hi = m;
  }
  const f = (s - a[lo].s) / (a[hi].s - a[lo].s);
  return a[lo].t + f * (a[hi].t - a[lo].t);
}

// ---------- Train motion ----------
function transitionTrain(train) {
  for (let iter = 0; iter < 16; iter++) {
    const edge = edges.get(train.edgeId);
    if (!edge) return;
    if (!edge._arc) buildArc(edge);
    const total = edge._arc.total;
    if (train.s >= 0 && train.s <= total) return;

    const exitingForward = train.s > total;
    const exitNodeId = exitingForward ? edge.to : edge.from;
    const overflow = exitingForward ? train.s - total : -train.s;

    let travelDir;
    if (exitingForward) travelDir = bezTangent(edge, 1);
    else { const t = bezTangent(edge, 0); travelDir = { x: -t.x, y: -t.y }; }

    const candidates = getConnectedEdges(exitNodeId).filter(c => c.id !== edge.id);

    if (!candidates.length) {
      train.dir = -train.dir;
      if (exitingForward) train.s = total - overflow;
      else train.s = overflow;
      return;
    }

    let best = null;
    const j = identifyJunction(exitNodeId);
    if (j) {
      // Real-railway turnout logic: trains from the stem are routed by the switch;
      // trains from a branch always exit via the stem (can't curve into the other branch).
      if (j.stem.id === edge.id) {
        const exitNode = nodes.get(exitNodeId);
        const sel = j.branches.find(b => b.id === exitNode.switchEdge);
        best = sel || j.branches[0];
      } else {
        best = j.stem;
      }
    } else {
      // Degree-2 node: only one candidate, just follow it through.
      best = candidates[0];
    }

    train.edgeId = best.id;
    if (!best._arc) buildArc(best);
    if (best.from === exitNodeId) { train.s = overflow; train.dir = 1; }
    else { train.s = best._arc.total - overflow; train.dir = -1; }
  }
}

function moveTrain(train, distance) {
  train.s += train.dir * distance;
  transitionTrain(train);
}

function getTrainPos(train) {
  const edge = edges.get(train.edgeId);
  if (!edge) return null;
  if (!edge._arc) buildArc(edge);
  const t = tFromS(edge, train.s);
  const p = bezPoint(edge, t);
  const tan = bezTangent(edge, t);
  let angle = Math.atan2(tan.y, tan.x);
  if (train.dir < 0) angle += Math.PI;
  return { x: p.x, y: p.y, angle };
}

// ---------- Train tail ----------
function rebuildTail(train) {
  const tail = [];
  const head = getTrainPos(train);
  if (!head) { train.tail = []; return; }
  tail.push({ x: head.x, y: head.y, angle: head.angle, d: 0 });

  const maxD = Math.max(80, (train.wagons + 1) * WAGON_GAP + WAGON_FIRST + 30);
  const back = { edgeId: train.edgeId, s: train.s, dir: -train.dir };
  const step = 3;
  let last = head;
  let totalD = 0;
  let safety = 0;
  while (totalD < maxD && safety++ < 500) {
    moveTrain(back, step);
    if (!edges.has(back.edgeId)) break;
    const edge = edges.get(back.edgeId);
    if (!edge._arc) buildArc(edge);
    const tp = tFromS(edge, back.s);
    const p = bezPoint(edge, tp);
    const tan = bezTangent(edge, tp);
    let ang = Math.atan2(tan.y, tan.x);
    if (back.dir > 0) ang += Math.PI;
    const dx = p.x - last.x, dy = p.y - last.y;
    const ed = Math.hypot(dx, dy);
    if (ed < 0.0001) continue;
    totalD += ed;
    tail.push({ x: p.x, y: p.y, angle: ang, d: totalD });
    last = p;
  }
  train.tail = tail;
}

function updateTrainTail(train) {
  const pos = getTrainPos(train);
  if (!pos) return;
  if (train._lastAngle != null) {
    let diff = pos.angle - train._lastAngle;
    while (diff > Math.PI) diff -= 2 * Math.PI;
    while (diff < -Math.PI) diff += 2 * Math.PI;
    if (Math.abs(diff) > Math.PI * 0.55) {
      rebuildTail(train);
      train._lastAngle = pos.angle;
      return;
    }
  }
  train._lastAngle = pos.angle;

  if (!train.tail || !train.tail.length) {
    rebuildTail(train);
    return;
  }
  const head = train.tail[0];
  const dx = pos.x - head.x, dy = pos.y - head.y;
  const d = Math.hypot(dx, dy);
  if (d < 0.6) {
    head.x = pos.x; head.y = pos.y; head.angle = pos.angle;
    return;
  }
  for (const entry of train.tail) entry.d += d;
  train.tail.unshift({ x: pos.x, y: pos.y, angle: pos.angle, d: 0 });
  const maxD = Math.max(80, (train.wagons + 1) * WAGON_GAP + WAGON_FIRST + 40);
  while (train.tail.length > 2 && train.tail[train.tail.length - 1].d > maxD) {
    train.tail.pop();
  }
}

function sampleTail(tail, d) {
  if (!tail || !tail.length) return null;
  if (d <= 0) return { x: tail[0].x, y: tail[0].y, angle: tail[0].angle };
  for (let i = 1; i < tail.length; i++) {
    if (tail[i].d >= d) {
      const span = tail[i].d - tail[i - 1].d || 1;
      const f = (d - tail[i - 1].d) / span;
      let a1 = tail[i - 1].angle, a2 = tail[i].angle;
      let dif = a2 - a1;
      while (dif > Math.PI) dif -= 2 * Math.PI;
      while (dif < -Math.PI) dif += 2 * Math.PI;
      return {
        x: tail[i - 1].x + f * (tail[i].x - tail[i - 1].x),
        y: tail[i - 1].y + f * (tail[i].y - tail[i - 1].y),
        angle: a1 + dif * f,
      };
    }
  }
  const last = tail[tail.length - 1];
  return { x: last.x, y: last.y, angle: last.angle };
}

function setWagons(train, count) {
  const old = train.wagons;
  train.wagons = Math.max(0, Math.min(MAX_WAGONS, count));
  if (train.wagons > old) rebuildTail(train);
}

function reverseTrain(train) {
  train.dir = -train.dir;
  rebuildTail(train);
  train._lastAngle = null;
}

function createTrain(edgeId, t, dir = 1) {
  const e = edges.get(edgeId);
  if (!e) return null;
  if (!e._arc) buildArc(e);
  const train = { edgeId, s: t * e._arc.total, dir, wagons: 0, tail: [], wobble: 0 };
  rebuildTail(train);
  trains.push(train);
  return train;
}

// ---------- Hit testing ----------
function distToBezier(e, x, y) {
  if (!e._arc) buildArc(e);
  const samples = e._arc.samples;
  let best = Infinity, bestT = 0;
  for (let i = 0; i < samples.length; i++) {
    const d = Math.hypot(samples[i].x - x, samples[i].y - y);
    if (d < best) { best = d; bestT = samples[i].t; }
  }
  return { dist: best, t: bestT };
}
function pickNode(wx, wy, maxDistWorld) {
  let best = null, bestD = maxDistWorld;
  for (const n of nodes.values()) {
    const d = Math.hypot(n.x - wx, n.y - wy);
    if (d < bestD) { bestD = d; best = n; }
  }
  return best;
}
function pickEdge(wx, wy, maxDistWorld) {
  let best = null, bestD = maxDistWorld, bestT = 0;
  for (const e of edges.values()) {
    const r = distToBezier(e, wx, wy);
    if (r.dist < bestD) { bestD = r.dist; best = e; bestT = r.t; }
  }
  return best ? { edge: best, t: bestT } : null;
}
function pickHandle(wx, wy, maxDistWorld) {
  let best = null, bestD = maxDistWorld;
  for (const e of edges.values()) {
    let d = Math.hypot(e.cp1.x - wx, e.cp1.y - wy);
    if (d < bestD) { bestD = d; best = { edgeId: e.id, which: 'cp1' }; }
    d = Math.hypot(e.cp2.x - wx, e.cp2.y - wy);
    if (d < bestD) { bestD = d; best = { edgeId: e.id, which: 'cp2' }; }
  }
  return best;
}
function pickTrain(wx, wy, maxDistWorld) {
  let best = null, bestD = maxDistWorld;
  for (const t of trains) {
    const pos = getTrainPos(t);
    if (!pos) continue;
    let d = Math.hypot(pos.x - wx, pos.y - wy);
    if (d < bestD) { bestD = d; best = t; }
    for (let i = 1; i <= t.wagons; i++) {
      const wp = sampleTail(t.tail, WAGON_FIRST + (i - 1) * WAGON_GAP);
      if (!wp) continue;
      d = Math.hypot(wp.x - wx, wp.y - wy);
      if (d < bestD) { bestD = d; best = t; }
    }
  }
  return best;
}

// ---------- UI ----------
const HINTS = {
  track: { title: 'Track tool', body: 'Click to drop points. Click an existing point to connect or close a loop. <kbd>Esc</kbd> or right-click to stop.' },
  move: { title: 'Move tool', body: 'Drag points to reposition. Hover a track to reveal its curve handles and reshape the curve.' },
  train: { title: 'Train tool', body: 'Click on a track to drop a train. Click any train to open its menu. <kbd>Space</kbd> to play.' },

  view3d: { title: '3D View', body: 'Drag to orbit · scroll to zoom · right-drag to pan. Switch to <kbd>2D</kbd> to edit tracks.' },

const hintEl = document.getElementById('hint');
function updateHint() {
  let h;
  if (viewMode === '3d') h = HINTS.view3d;
  else if (viewMode === 'fps') h = HINTS.fps;
  else h = HINTS[tool];
  hintEl.querySelector('.title').innerHTML = h.title;
  hintEl.querySelector('.body').innerHTML = h.body;
}

// Hint toggle (mobile collapsed hint panel)
const hintToggle = document.getElementById('hintToggle');
if (hintToggle) {
  hintToggle.addEventListener('click', () => {
    document.body.classList.toggle('hint-open');
  });
  // Tapping outside the hint closes it
  document.addEventListener('pointerdown', (e) => {
    if (!document.body.classList.contains('hint-open')) return;
    if (hintEl.contains(e.target) || hintToggle.contains(e.target)) return;
    document.body.classList.remove('hint-open');
  }, true);
}

document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => setTool(btn.dataset.tool));
});
function setTool(t) {
  tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tool === t);
  });
  pendingNodeId = null;
  updateHint();
  updateCursor();
}

const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');

  playing = p;
  playIcon.innerHTML = playing
    ? '<path d="M7 5h3.5v14H7zM13.5 5H17v14h-3.5z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

  selectedTrain = null; hideTrainMenu(); markTracksDirty();
});
document.getElementById('resetViewBtn').addEventListener('click', () => {
  if (viewMode === '2d') { view.x = 0; view.y = 0; view.scale = 1; }
  else view3d.recenterCamera();
});

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => setViewMode(btn.dataset.view));
});
function setViewMode(m) {
  viewMode = m;
  document.querySelectorAll('.view-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === m);
  });
  if (m === '3d' || m === 'fps') {
    document.body.classList.add('view-3d');
    canvas.style.display = 'none';
    if (selectedTrain) hideTrainMenu();
    view3d.show();
    view3d.setCameraMode(m === 'fps' ? 'fps' : 'orbit');
  } else {
    document.body.classList.remove('view-3d');
    canvas.style.display = 'block';
    view3d.hide();
  }
  updateHint();
}

// ---------- Train menu ----------
const trainMenu = document.getElementById('trainMenu');
const wagonCountEl = document.getElementById('wagonCount');
const wagonDecBtn = document.getElementById('wagonDec');
const wagonIncBtn = document.getElementById('wagonInc');
const reverseBtn = document.getElementById('reverseBtn');
const deleteTrainBtn = document.getElementById('deleteTrain');
let trainMenuAnchor = null;

function showTrainMenu(train, screenX, screenY) {
  selectedTrain = train;
  trainMenuAnchor = { x: screenX, y: screenY };
  updateTrainMenuVisual();
  positionTrainMenu();
}
function hideTrainMenu() {
  trainMenu.style.display = 'none';
  trainMenuAnchor = null;
  selectedTrain = null;
}
function positionTrainMenu() {
  if (!selectedTrain || !trainMenuAnchor || viewMode !== '2d') { trainMenu.style.display = 'none'; return; }
  if (!trains.includes(selectedTrain)) { hideTrainMenu(); return; }
  trainMenu.style.display = 'block';
  const rect = trainMenu.getBoundingClientRect();
  const mw = rect.width || 220, mh = rect.height || 140;
  // Reserve space for the bottom UI (toolbar + controls on phones, just controls on desktop).
  const isPhone = window.matchMedia('(max-width: 640px)').matches;
  const bottomReserve = isPhone ? 140 : 80;
  const topReserve = isPhone ? 80 : 12;
  let x = trainMenuAnchor.x + 24;
  let y = trainMenuAnchor.y - mh / 2;
  if (x + mw > W - 12) x = trainMenuAnchor.x - 24 - mw;
  if (x < 12) x = 12;
  if (y < topReserve) y = topReserve;
  if (y + mh > H - bottomReserve) y = H - bottomReserve - mh;
  if (y < topReserve) y = topReserve; // re-clamp if menu is taller than free vertical space
  trainMenu.style.left = x + 'px';
  trainMenu.style.top = y + 'px';
}
function updateTrainMenuVisual() {
  if (!selectedTrain) return;
  wagonCountEl.textContent = selectedTrain.wagons;
  wagonDecBtn.disabled = selectedTrain.wagons <= 0;
  wagonIncBtn.disabled = selectedTrain.wagons >= MAX_WAGONS;
}
wagonDecBtn.addEventListener('click', (e) => { e.stopPropagation(); if (selectedTrain) { setWagons(selectedTrain, selectedTrain.wagons - 1); updateTrainMenuVisual(); } });
wagonIncBtn.addEventListener('click', (e) => { e.stopPropagation(); if (selectedTrain) { setWagons(selectedTrain, selectedTrain.wagons + 1); updateTrainMenuVisual(); } });
